name: PayNote
options:
  bundleIdPrefix: com.azukid
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: 5C2UYK6F45
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  PayNote:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: PayNote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.azukid.AzCreditS1
        MARKETING_VERSION: "1.3.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: PayNote/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""

  PayNoteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PayNoteTests
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PayNote.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PayNote"
    dependencies:
      - target: PayNote

  PayNoteUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PayNoteUITests
    dependencies:
      - target: PayNote
